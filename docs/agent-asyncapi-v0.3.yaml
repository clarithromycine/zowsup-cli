asyncapi: 3.0.0
info:
  title: Zowsup Agent Protocol
  version: 0.3.0-draft
  description: |
    Backend <-> Agent websocket protocol draft.
    This document aligns with AGENT_INTERFACE_V0_2_FIELD_SPEC.md and agent-protocol.schema.json.

servers:
  prod:
    host: api.example.com
    pathname: /ws/agent
    protocol: wss
    description: Production websocket endpoint for agents

channels:
  agentConnection:
    address: /ws/agent
    messages:
      agentAuth:
        $ref: '#/components/messages/AgentAuth'
      agentAuthOk:
        $ref: '#/components/messages/AgentAuthOk'
      heartbeat:
        $ref: '#/components/messages/AgentHeartbeat'
      startBot:
        $ref: '#/components/messages/StartBotCommand'
      stopBot:
        $ref: '#/components/messages/StopBotCommand'
      getBotStatus:
        $ref: '#/components/messages/GetBotStatusCommand'
      listBots:
        $ref: '#/components/messages/ListBotsCommand'
      fetchQr:
        $ref: '#/components/messages/FetchQrCommand'
      commandAck:
        $ref: '#/components/messages/CommandAck'
      commandResult:
        $ref: '#/components/messages/CommandResult'
      botSnapshot:
        $ref: '#/components/messages/BotSnapshotEvent'
      botStatusChanged:
        $ref: '#/components/messages/BotStatusChangedEvent'
      botLog:
        $ref: '#/components/messages/BotLogEvent'
      qrUpdated:
        $ref: '#/components/messages/QrUpdatedEvent'
      messageIngested:
        $ref: '#/components/messages/MessageIngestedEvent'
      error:
        $ref: '#/components/messages/ErrorMessage'

operations:
  agentSend:
    action: send
    channel:
      $ref: '#/channels/agentConnection'
    summary: Messages sent by Agent to Backend
    messages:
      - $ref: '#/channels/agentConnection/messages/agentAuth'
      - $ref: '#/channels/agentConnection/messages/heartbeat'
      - $ref: '#/channels/agentConnection/messages/commandAck'
      - $ref: '#/channels/agentConnection/messages/commandResult'
      - $ref: '#/channels/agentConnection/messages/botSnapshot'
      - $ref: '#/channels/agentConnection/messages/botStatusChanged'
      - $ref: '#/channels/agentConnection/messages/botLog'
      - $ref: '#/channels/agentConnection/messages/qrUpdated'
      - $ref: '#/channels/agentConnection/messages/messageIngested'
      - $ref: '#/channels/agentConnection/messages/error'

  backendSend:
    action: send
    channel:
      $ref: '#/channels/agentConnection'
    summary: Messages sent by Backend to Agent
    messages:
      - $ref: '#/channels/agentConnection/messages/agentAuthOk'
      - $ref: '#/channels/agentConnection/messages/startBot'
      - $ref: '#/channels/agentConnection/messages/stopBot'
      - $ref: '#/channels/agentConnection/messages/getBotStatus'
      - $ref: '#/channels/agentConnection/messages/listBots'
      - $ref: '#/channels/agentConnection/messages/fetchQr'

components:
  schemas:
    Envelope:
      type: object
      required:
        - msg_id
        - protocol_version
        - type
        - name
        - agent_id
        - timestamp
        - payload
      properties:
        msg_id:
          type: string
          format: uuid
        protocol_version:
          type: string
          enum: ["1.0"]
        type:
          type: string
          enum: ["auth", "auth_ok", "command", "command_ack", "command_result", "event", "heartbeat", "error"]
        name:
          type: string
        agent_id:
          type: string
          pattern: '^[A-Za-z0-9_-]{3,64}$'
        timestamp:
          type: integer
          minimum: 0
        session_token:
          type: string
        payload:
          type: object
        trace_id:
          type: string
          format: uuid

    ErrorObject:
      type: object
      required: [code, message, retryable]
      properties:
        code:
          type: string
          enum:
            - auth_failed
            - agent_disabled
            - session_expired
            - payload_invalid
            - command_not_supported
            - bot_already_running
            - bot_not_found
            - bot_start_failed
            - command_timeout
            - internal_error
            - protocol_version_unsupported
        message:
          type: string
        retryable:
          type: boolean
        detail:
          type: object

    BotStatusItem:
      type: object
      required: [phone, running]
      properties:
        phone:
          type: string
          pattern: '^[0-9]{7,15}$'
        running:
          type: boolean
        pid:
          type: integer
        bot_jid:
          type: string
        last_seen:
          type: integer
        health:
          type: string
          enum: [ok, warn, error]

  messages:
    AgentAuth:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: auth }
              name: { const: agent_auth }
              payload:
                type: object
                required: [agent_key, agent_version]
                properties:
                  agent_key: { type: string, minLength: 32 }
                  agent_version: { type: string }
                  hostname: { type: string }

    AgentAuthOk:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: auth_ok }
              name: { const: agent_auth_ok }
              payload:
                type: object
                required: [session_token, expires_at]
                properties:
                  session_token: { type: string }
                  expires_at: { type: integer }

    AgentHeartbeat:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: heartbeat }
              name: { const: agent_heartbeat }
              payload:
                type: object
                required: [bot_count, running_count]
                properties:
                  bot_count: { type: integer }
                  running_count: { type: integer }
                  queue_backlog: { type: integer }

    StartBotCommand:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: command }
              name: { const: start_bot }

    StopBotCommand:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: command }
              name: { const: stop_bot }

    GetBotStatusCommand:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: command }
              name: { const: get_bot_status }

    ListBotsCommand:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: command }
              name: { const: list_bots }

    FetchQrCommand:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: command }
              name: { const: fetch_qr }

    CommandAck:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: command_ack }

    CommandResult:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: command_result }

    BotSnapshotEvent:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: event }
              name: { const: bot_snapshot }
              payload:
                type: object
                required: [snapshot_id, bots]
                properties:
                  snapshot_id: { type: string }
                  bots:
                    type: array
                    items: { $ref: '#/components/schemas/BotStatusItem' }

    BotStatusChangedEvent:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: event }
              name: { const: bot_status_changed }

    BotLogEvent:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: event }
              name: { const: bot_log }

    QrUpdatedEvent:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: event }
              name: { const: qr_updated }

    MessageIngestedEvent:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: event }
              name: { const: message_ingested }

    ErrorMessage:
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            properties:
              type: { const: error }
              name: { const: error }
              payload: { $ref: '#/components/schemas/ErrorObject' }
